<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            color: #052f5b;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            color: #32e2c5;
        }
        p {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .doctor-img {
            max-width: 250px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: rgb(4 44 125);
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        a:hover {
            background-color: rgb(77 105 171);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oops! Página Não Encontrada</h1>
        <p>Parece que você se perdeu... mas não se preocupe, o médico está aqui para ajudar!</p>
        <a href="javascript:history.back()">Voltar para a página anterior</a>
    </div>
</body>
</html>
