version: "3.9"
services:
  db:
    image: postgres:14
    volumes:
      - via-cep-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
  redis:
    image: "redis:7-alpine"
    ports:
      - 6379
    volumes:
      - via-cep-redis-data:/data
  web:
    build: .
    tty: true
    stdin_open: true
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0' && bundle exec bin/vite dev"
    volumes:
      - .:/var/www/core
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
      - mailer
    links:
      - db
      - redis
      - mailer
  mailer:
    image: schickling/mailcatcher
    ports:
      - 1025:1025
      - 1080:1080
volumes:
  via-cep-data:
  via-cep-redis-data:
