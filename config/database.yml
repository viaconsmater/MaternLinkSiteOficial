default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV["DATABASE_POOL"] || ENV['MAX_THREADS'] || 5 %>

development:
  <<: *default
  adapter: postgresql
  encoding: unicode
  database: <%= ENV['DB_NAME'] || 'viaconsultas' %>
  host: <%= ENV['DB_HOST'] || 'localhost' %>
  username: <%= ENV['DB_USER'] || 'postgres' %>
  password: <%= ENV['DB_PASSWORD'] || '123456' %>
  port: <%= ENV['DB_PORT'] || 5432 %>
  pool: 5

test:
  <<: *default
  database: viaconsultas_test
  username: postgres
  password: ''
  host: localhost
  port: 5432

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>

staging:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
